server:
  port: 9040

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/emiya_oj_blog?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  rabbitmq:
    host: ${RABBITMQ_HOST:127.0.0.1}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    com.emiyaoj: DEBUG

emiyaoj:
  minio:
    endpoint: ${MINIO_ENDPOINT:http://127.0.0.1:9000}
    public-endpoint: ${MINIO_PUBLIC_ENDPOINT:http://127.0.0.1:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:blog-images}
    max-file-size: ${BLOG_IMAGE_MAX_FILE_SIZE:10485760}
  moderation:
    internal-token: ${MODERATION_INTERNAL_TOKEN:emiyaoj-moderation-internal}

app:
  file:
    public-base-url: ${APP_FILE_PUBLIC_BASE_URL:${MINIO_PUBLIC_ENDPOINT:http://127.0.0.1:9000}}
    bucket: ${APP_FILE_BUCKET:${MINIO_BUCKET:blog-images}}

# SpringDoc OpenAPI 配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: default
      display-name: 博客服务
      paths-to-match: '/**'
      packages-to-scan: com.emiyaoj.blog.controller
