server:
  port: 9020

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/emiya_oj_problem?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:true}
    baseline-version: 1
    baseline-description: Current schema before Flyway adoption
    validate-on-migrate: true
    clean-disabled: true
    out-of-order: false
    connect-retries: 10
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

mybatis-plus:
  configuration:
    default-enum-type-handler: com.baomidou.mybatisplus.core.handlers.MybatisEnumTypeHandler
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      update-strategy: not_null
      id-type: assign_id
  type-aliases-package: com.emiyaoj.problem.domain.pojo
  mapper-locations: classpath:/mapper/**/*.xml

logging:
  level:
    com.emiyaoj: DEBUG

judge:
  internal-token: ${JUDGE_INTERNAL_TOKEN:emiyaoj-judge-internal}

test-case-generator:
  max-generated-cases: ${TEST_CASE_GENERATOR_MAX_GENERATED_CASES:1000}

# SpringDoc OpenAPI 配置
emiyaoj:
  minio:
    endpoint: ${MINIO_ENDPOINT:http://127.0.0.1:9000}
    public-endpoint: ${MINIO_PUBLIC_ENDPOINT:http://127.0.0.1:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:problem-images}
    max-file-size: ${PROBLEM_IMAGE_MAX_FILE_SIZE:10485760}

app:
  file:
    public-base-url: ${APP_FILE_PUBLIC_BASE_URL:${MINIO_PUBLIC_ENDPOINT:http://127.0.0.1:9000}}
    bucket: ${APP_FILE_BUCKET:${MINIO_BUCKET:problem-images}}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: default
      display-name: 题目服务
      paths-to-match: '/**'
      packages-to-scan: com.emiyaoj.problem.controller
