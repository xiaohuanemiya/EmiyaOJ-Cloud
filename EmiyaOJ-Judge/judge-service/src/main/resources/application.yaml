server:
  port: 9030

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/emiya_oj_judge?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:true}
    baseline-version: 1
    baseline-description: Current schema before Flyway adoption
    validate-on-migrate: true
    clean-disabled: true
    out-of-order: false
    connect-retries: 10
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    #log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret-key: emiyaoj-jwt-secret-key-2024
  ttl: 7200000
  token-name: Authorization

go-judge:
  url: ${GO_JUDGE_URL:http://localhost:5050}
  response-max-in-memory-size: ${GO_JUDGE_RESPONSE_MAX_IN_MEMORY_SIZE:201326592}

judge:
  internal-token: ${JUDGE_INTERNAL_TOKEN:emiyaoj-judge-internal}

logging:
  level:
    com.emiyaoj: debug

# SpringDoc OpenAPI 配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: default
      display-name: 判题服务
      paths-to-match: '/**'
      packages-to-scan: com.emiyaoj.judge.controller
