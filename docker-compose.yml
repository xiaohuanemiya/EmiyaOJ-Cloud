version: '3.8'

services:
  # =====================================================
  # 基础设施
  # =====================================================

  mysql:
    image: mysql:8.0.31
    container_name: emiyaoj-mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      TZ: Asia/Shanghai
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    networks:
      - emiyaoj-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: emiyaoj-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - emiyaoj-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nacos:
    image: nacos/nacos-server:v2.5.1
    container_name: emiyaoj-nacos
    restart: always
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    environment:
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: ""
      NACOS_AUTH_ENABLE: "false"
      JVM_XMS: 256m
      JVM_XMX: 256m
      JVM_XMN: 128m
    networks:
      - emiyaoj-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 10

  # =====================================================
  # GoJudge 判题沙箱
  # =====================================================

  go-judge:
    build:
      context: ./go-judge
      dockerfile: Dockerfile
    container_name: emiyaoj-go-judge
    restart: always
    ports:
      - "5050:5050"
    privileged: true
    shm_size: 256m
    networks:
      - emiyaoj-network

  # =====================================================
  # 微服务
  # =====================================================

  gateway:
    build:
      context: ./EmiyaOJ-Gateway
      dockerfile: Dockerfile
    container_name: emiyaoj-gateway
    restart: always
    ports:
      - "8080:8080"
    environment:
      NACOS_ADDR: nacos:8848
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      nacos:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - emiyaoj-network

  auth-service:
    build:
      context: ./EmiyaOJ-Auth/auth-service
      dockerfile: Dockerfile
    container_name: emiyaoj-auth-service
    restart: always
    ports:
      - "9010:9010"
    environment:
      NACOS_ADDR: nacos:8848
      MYSQL_HOST: mysql
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - emiyaoj-network

  problem-service:
    build:
      context: ./EmiyaOJ-Problem/problem-service
      dockerfile: Dockerfile
    container_name: emiyaoj-problem-service
    restart: always
    ports:
      - "9020:9020"
    environment:
      NACOS_ADDR: nacos:8848
      MYSQL_HOST: mysql
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - emiyaoj-network

  judge-service:
    build:
      context: ./EmiyaOJ-Judge/judge-service
      dockerfile: Dockerfile
    container_name: emiyaoj-judge-service
    restart: always
    ports:
      - "9030:9030"
    environment:
      NACOS_ADDR: nacos:8848
      MYSQL_HOST: mysql
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      REDIS_HOST: redis
      REDIS_PORT: 6379
      GO_JUDGE_URL: http://go-judge:5050
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
      redis:
        condition: service_healthy
      go-judge:
        condition: service_started
    networks:
      - emiyaoj-network

  blog-service:
    build:
      context: ./EmiyaOJ-Blog
      dockerfile: Dockerfile
    container_name: emiyaoj-blog-service
    restart: always
    ports:
      - "9040:9040"
    environment:
      NACOS_ADDR: nacos:8848
      MYSQL_HOST: mysql
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - emiyaoj-network

  chat-service:
    build:
      context: ./EmiyaOJ-Chat
      dockerfile: Dockerfile
    container_name: emiyaoj-chat-service
    restart: always
    ports:
      - "9050:9050"
    environment:
      NACOS_ADDR: nacos:8848
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CHAT_API_KEY: ${CHAT_API_KEY:-sk-492762b5f2434bf59cfcbe80ce6612f5}
    depends_on:
      nacos:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - emiyaoj-network

volumes:
  mysql-data:
  redis-data:

networks:
  emiyaoj-network:
    driver: bridge
